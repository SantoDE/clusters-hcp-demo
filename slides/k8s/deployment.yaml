apiVersion: v1
kind: Namespace
metadata:
  name: slides
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: slides
  namespace: slides
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slides
  template:
    metadata:
      labels:
        app: slides
    spec:
      containers:
        - name: slides
          image: docker.io/santode/slides:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: slides
  namespace: slides
spec:
  selector:
    app: slides
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: slides
  namespace: slides
spec:
  ingressClassName: traefik
  rules:
    - host: slides.manuelzapf.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: slides
                port:
                  number: 80
