name: Trigger Slides Deploy

on:
  push:
    branches: [main]
    paths:
      - 'slides/**'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to slides repo
        env:
          GH_TOKEN: ${{ secrets.SLIDES_DEPLOY_TOKEN }}
        run: gh api repos/SantoDE/slides/dispatches -f event_type=deploy
