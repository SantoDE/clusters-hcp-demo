name: Deploy Slides

on:
  push:
    branches: [main]
    paths:
      - 'slides/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: slides
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Checkout theme
        run: git clone https://x-access-token:${{ secrets.SLIDES_DEPLOY_TOKEN }}@github.com/SantoDE/slidev-theme-codecentric.git $GITHUB_WORKSPACE/../slidev-theme-codecentric

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: slides/package-lock.json

      - name: Install D2
        run: curl -fsSL https://d2lang.com/install.sh | sh -s --

      - name: Generate diagrams
        run: |
          for f in diagrams/*.d2; do
            d2 "$f" "public/diagrams/$(basename "${f%.d2}.svg")"
          done

      - name: Generate QR code
        run: |
          pip install qrcode[svg] --quiet
          python3 -c "
          import qrcode, qrcode.image.svg
          qr = qrcode.QRCode(error_correction=qrcode.constants.ERROR_CORRECT_L, box_size=10, border=2)
          qr.add_data('https://slides.manuelzapf.io/from-clusters-to-controlplanes')
          qr.make(fit=True)
          qr.make_image(image_factory=qrcode.image.svg.SvgPathImage).save('public/qr-slides.svg')
          "

      - name: Install dependencies
        run: npm ci

      - name: Build slides
        run: npm run build -- --base /from-clusters-to-controlplanes/

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: slides
          push: true
          tags: ghcr.io/santode/clusters-hcp-demo/slides:latest

      - name: Deploy to k3s
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_DATA }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          kubectl apply -f k8s/
          kubectl rollout restart deployment/slides -n slides
          kubectl rollout status deployment/slides -n slides --timeout=120s
