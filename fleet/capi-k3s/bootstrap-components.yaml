apiVersion: v1
kind: Service
metadata:
  labels:
    cluster.x-k8s.io/provider: bootstrap-k3s
  name: capi-k3s-bootstrap-webhook-service
  namespace: capi-k3s-bootstrap-system
spec:
  ports:
  - port: 443
    targetPort: 9443
  selector:
    cluster.x-k8s.io/provider: bootstrap-k3s
    control-plane: controller-manager
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    cluster.x-k8s.io/provider: bootstrap-k3s
    control-plane: controller-manager
  name: capi-k3s-bootstrap-controller-manager
  namespace: capi-k3s-bootstrap-system
spec:
  replicas: 1
  selector:
    matchLabels:
      cluster.x-k8s.io/provider: bootstrap-k3s
      control-plane: controller-manager
  template:
    metadata:
      labels:
        cluster.x-k8s.io/provider: bootstrap-k3s
        control-plane: controller-manager
    spec:
      containers:
      - args:
        - --enable-leader-election
        command:
        - /manager
        image: ghcr.io/k3s-io/cluster-api-k3s/bootstrap-controller:v0.4.0
        name: manager
        ports:
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: cert
          readOnly: true
      terminationGracePeriodSeconds: 10
      volumes:
      - name: cert
        secret:
          defaultMode: 420
          secretName: capi-k3s-bootstrap-webhook-service-cert
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  labels:
    cluster.x-k8s.io/provider: bootstrap-k3s
  name: capi-k3s-bootstrap-serving-cert
  namespace: capi-k3s-bootstrap-system
spec:
  dnsNames:
  - capi-k3s-bootstrap-webhook-service.capi-k3s-bootstrap-system.svc
  - capi-k3s-bootstrap-webhook-service.capi-k3s-bootstrap-system.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: capi-k3s-bootstrap-selfsigned-issuer
  secretName: capi-k3s-bootstrap-webhook-service-cert
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  labels:
    cluster.x-k8s.io/provider: bootstrap-k3s
  name: capi-k3s-bootstrap-selfsigned-issuer
  namespace: capi-k3s-bootstrap-system
spec:
  selfSigned: {}
---
