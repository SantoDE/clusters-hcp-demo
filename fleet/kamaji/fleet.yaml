defaultNamespace: kamaji-system
helm:
  repo: https://clastix.github.io/charts
  chart: kamaji
  releaseName: kamaji
diff:
  comparePatches:
    - apiVersion: admissionregistration.k8s.io/v1
      kind: MutatingWebhookConfiguration
      operations:
        - op: remove
          path: /webhooks
    - apiVersion: admissionregistration.k8s.io/v1
      kind: ValidatingWebhookConfiguration
      operations:
        - op: remove
          path: /webhooks
