---
apiVersion: v1
kind: Namespace
metadata:
  name: capi-k3s-kubevirt
  labels:
    cluster-api.cattle.io/rancher-auto-import: "true"
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: k3s-kubevirt
  namespace: capi-k3s-kubevirt
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
        - 10.244.0.0/16
    services:
      cidrBlocks:
        - 10.96.0.0/12
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1beta2
    kind: KThreesControlPlane
    name: k3s-kubevirt-cp
    namespace: capi-k3s-kubevirt
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
    kind: KubevirtCluster
    name: k3s-kubevirt
    namespace: capi-k3s-kubevirt
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubevirtCluster
metadata:
  name: k3s-kubevirt
  namespace: capi-k3s-kubevirt
spec:
  controlPlaneServiceTemplate:
    spec:
      type: NodePort
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta2
kind: KThreesControlPlane
metadata:
  name: k3s-kubevirt-cp
  namespace: capi-k3s-kubevirt
spec:
  replicas: 1
  version: v1.35.5+k3s1
  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
      kind: KubevirtMachineTemplate
      name: k3s-kubevirt-cp
      namespace: capi-k3s-kubevirt
  kthreesConfigSpec:
    preK3sCommands:
      - "resolvectl dns enp1s0 8.8.8.8 8.8.4.4 || true"
      - "until nslookup get.k3s.io >/dev/null 2>&1; do sleep 1; done"
      - "sed -i '/cloud-provider=external/d; /^kubelet-arg:$/d; /^kube-controller-manager-arg:$/d' /etc/rancher/k3s/config.yaml 2>/dev/null || true"
      - "IP=$(awk '/^tls-san:/{found=1;next} found && /^-/{print $2;exit}' /etc/rancher/k3s/config.yaml); [ -n \"$IP\" ] && echo \"advertise-address: $IP\" >> /etc/rancher/k3s/config.yaml || true"
    serverConfig:
      disableCloudController: false
      disableComponents:
        - servicelb
        - traefik
      clusterCidr: "10.244.0.0/16"
      serviceCidr: "10.96.0.0/12"
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubevirtMachineTemplate
metadata:
  name: k3s-kubevirt-cp
  namespace: capi-k3s-kubevirt
spec:
  template:
    spec:
      virtualMachineBootstrapCheck:
        checkStrategy: none
      virtualMachineTemplate:
        spec:
          runStrategy: Always
          dataVolumeTemplates:
            - metadata:
                name: boot
              spec:
                pvc:
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 40Gi
                source:
                  registry:
                    url: docker://quay.io/containerdisks/ubuntu:22.04
          template:
            spec:
              domain:
                cpu:
                  cores: 4
                memory:
                  guest: 6Gi
                devices:
                  disks:
                    - name: boot
                      disk:
                        bus: virtio
                  interfaces:
                    - name: default
                      masquerade: {}
                      ports:
                        - name: k3s-api
                          port: 6443
                          protocol: TCP
                        - name: ssh
                          port: 22
                          protocol: TCP
              volumes:
                - name: boot
                  dataVolume:
                    name: boot
              networks:
                - name: default
                  pod: {}
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: k3s-kubevirt-md-0
  namespace: capi-k3s-kubevirt
spec:
  clusterName: k3s-kubevirt
  replicas: 1
  selector:
    matchLabels: null
  template:
    spec:
      clusterName: k3s-kubevirt
      version: v1.35.5+k3s1
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
          kind: KThreesConfigTemplate
          name: k3s-kubevirt-md-0
          namespace: capi-k3s-kubevirt
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
        kind: KubevirtMachineTemplate
        name: k3s-kubevirt-md-0
        namespace: capi-k3s-kubevirt
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
kind: KThreesConfigTemplate
metadata:
  name: k3s-kubevirt-md-0
  namespace: capi-k3s-kubevirt
spec:
  template:
    spec:
      preK3sCommands:
        - "resolvectl dns enp1s0 8.8.8.8 8.8.4.4 || true"
        - "until nslookup get.k3s.io >/dev/null 2>&1; do sleep 1; done"
        - "sed -i '/cloud-provider=external/d; /^kubelet-arg:$/d; /^kube-controller-manager-arg:$/d' /etc/rancher/k3s/config.yaml 2>/dev/null || true"
      agentConfig: {}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubevirtMachineTemplate
metadata:
  name: k3s-kubevirt-md-0
  namespace: capi-k3s-kubevirt
spec:
  template:
    spec:
      virtualMachineBootstrapCheck:
        checkStrategy: none
      virtualMachineTemplate:
        spec:
          runStrategy: Always
          dataVolumeTemplates:
            - metadata:
                name: boot
              spec:
                pvc:
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 20Gi
                source:
                  registry:
                    url: docker://quay.io/containerdisks/ubuntu:22.04
          template:
            spec:
              domain:
                cpu:
                  cores: 2
                memory:
                  guest: 4Gi
                devices:
                  disks:
                    - name: boot
                      disk:
                        bus: virtio
                  interfaces:
                    - name: default
                      masquerade: {}
                      ports:
                        - name: ssh
                          port: 22
                          protocol: TCP
              volumes:
                - name: boot
                  dataVolume:
                    name: boot
              networks:
                - name: default
                  pod: {}
