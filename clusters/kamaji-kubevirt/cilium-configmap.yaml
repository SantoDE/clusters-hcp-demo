apiVersion: v1
data:
  cilium.yaml: "---\n# Source: cilium/templates/cilium-secrets-namespace.yaml\napiVersion:
    v1\nkind: Namespace\nmetadata:\n  name: \"cilium-secrets\"\n  labels:\n    app.kubernetes.io/part-of:
    cilium\n  annotations:\n\n---\n# Source: cilium/templates/cilium-agent/serviceaccount.yaml\napiVersion:
    v1\nkind: ServiceAccount\nmetadata:\n  name: \"cilium\"\n  namespace: kube-system\n\n---\n#
    Source: cilium/templates/cilium-envoy/serviceaccount.yaml\napiVersion: v1\nkind:
    ServiceAccount\nmetadata:\n  name: \"cilium-envoy\"\n  namespace: kube-system\n\n---\n#
    Source: cilium/templates/cilium-operator/serviceaccount.yaml\napiVersion: v1\nkind:
    ServiceAccount\nmetadata:\n  name: \"cilium-operator\"\n  namespace: kube-system\n\n---\n#
    Source: cilium/templates/cilium-ca-secret.yaml\napiVersion: v1\nkind: Secret\nmetadata:\n
    \ name: cilium-ca\n  namespace: kube-system\n  labels:\n    cilium.io/helm-template-non-idempotent:
    \"true\"\ndata:\n  ca.crt: \n
    \ ca.key: \n\n---\n#
    Source: cilium/templates/hubble/tls-helm/server-secret.yaml\napiVersion: v1\nkind:
    Secret\nmetadata:\n  name: hubble-server-certs\n  namespace: kube-system\n  labels:\n
    \   cilium.io/helm-template-non-idempotent: \"true\"\n\n  annotations:\ntype:
    kubernetes.io/tls\ndata:\n  ca.crt:  \n
    \ tls.crt: \n
    \ tls.key: \n\n---\n#
    Source: cilium/templates/cilium-configmap.yaml\napiVersion: v1\nkind: ConfigMap\nmetadata:\n
    \ name: cilium-config\n  namespace: kube-system\ndata:\n\n  # Identity allocation
    mode selects how identities are shared between cilium\n  # nodes by setting how
    they are stored. The options are \"crd\", \"kvstore\" or\n  # \"doublewrite-readkvstore\"
    / \"doublewrite-readcrd\".\n  # - \"crd\" stores identities in kubernetes as CRDs
    (custom resource definition).\n  #   These can be queried with:\n  #     kubectl
    get ciliumid\n  # - \"kvstore\" stores identities in an etcd kvstore, that is\n
    \ #   configured below. Cilium versions before 1.6 supported only the kvstore\n
    \ #   backend. Upgrades from these older cilium versions should continue using\n
    \ #   the kvstore by commenting out the identity-allocation-mode below, or\n  #
    \  setting it to \"kvstore\".\n  # - \"doublewrite\" modes store identities in
    both the kvstore and CRDs. This is useful\n  #   for seamless migrations from
    the kvstore mode to the crd mode. Consult the\n  #   documentation for more information
    on how to perform the migration.\n  identity-allocation-mode: crd\n\n  identity-heartbeat-timeout:
    \"30m0s\"\n  identity-gc-interval: \"15m0s\"\n  cilium-endpoint-gc-interval: \"5m0s\"\n
    \ nodes-gc-interval: \"5m0s\"\n\n  # If you want to run cilium in debug mode change
    this value to true\n  debug: \"false\"\n  metrics-sampling-interval: \"5m\"\n
    \ # The agent can be put into the following three policy enforcement modes\n  #
    default, always and never.\n  # https://docs.cilium.io/en/latest/security/policy/intro/#policy-enforcement-modes\n
    \ enable-policy: \"default\"\n  # If you want metrics enabled in cilium-operator,
    set the port for\n  # which the Cilium Operator will have their metrics exposed.\n
    \ # NOTE that this will open the port on the nodes where Cilium operator pod\n
    \ # is scheduled.\n  operator-prometheus-serve-addr: \":9963\"\n  enable-metrics:
    \"true\"\n  enable-policy-secrets-sync: \"true\"\n  policy-secrets-only-from-secrets-namespace:
    \"true\"\n  policy-secrets-namespace: \"cilium-secrets\"\n\n  # Enable IPv4 addressing.
    If enabled, all endpoints are allocated an IPv4\n  # address.\n  enable-ipv4:
    \"true\"\n\n  # Enable IPv6 addressing. If enabled, all endpoints are allocated
    an IPv6\n  # address.\n  enable-ipv6: \"false\"\n  # Users who wish to specify
    their own custom CNI configuration file must set\n  # custom-cni-conf to \"true\",
    otherwise Cilium may overwrite the configuration.\n  custom-cni-conf: \"false\"\n
    \ enable-bpf-clock-probe: \"false\"\n  # If you want cilium monitor to aggregate
    tracing for packets, set this level\n  # to \"low\", \"medium\", or \"maximum\".
    The higher the level, the less packets\n  # that will be seen in monitor output.\n
    \ monitor-aggregation: medium\n\n  # The monitor aggregation interval governs
    the typical time between monitor\n  # notification events for each allowed connection.\n
    \ #\n  # Only effective when monitor aggregation is set to \"medium\" or higher.\n
    \ monitor-aggregation-interval: \"5s\"\n\n  # The monitor aggregation flags determine
    which TCP flags which, upon the\n  # first observation, cause monitor notifications
    to be generated.\n  #\n  # Only effective when monitor aggregation is set to \"medium\"
    or higher.\n  monitor-aggregation-flags: all\n  # Specifies the ratio (0.0-1.0]
    of total system memory to use for dynamic\n  # sizing of the TCP CT, non-TCP CT,
    NAT and policy BPF maps.\n  bpf-map-dynamic-size-ratio: \"0.0025\"\n  # bpf-policy-map-max
    specifies the maximum number of entries in endpoint\n  # policy map (per endpoint)\n
    \ bpf-policy-map-max: \"16384\"\n  # bpf-policy-stats-map-max specifies the maximum
    number of entries in global\n  # policy stats map\n  bpf-policy-stats-map-max:
    \"65536\"\n  # bpf-lb-map-max specifies the maximum number of entries in bpf lb
    service,\n  # backend and affinity maps.\n  bpf-lb-map-max: \"65536\"\n  bpf-lb-external-clusterip:
    \"false\"\n  bpf-lb-source-range-all-types: \"false\"\n  bpf-lb-algorithm-annotation:
    \"false\"\n  bpf-lb-mode-annotation: \"false\"\n\n  bpf-distributed-lru: \"false\"\n
    \ bpf-events-drop-enabled: \"true\"\n  bpf-events-policy-verdict-enabled: \"true\"\n
    \ bpf-events-trace-enabled: \"true\"\n\n  # Pre-allocation of map entries allows
    per-packet latency to be reduced, at\n  # the expense of up-front memory allocation
    for the entries in the maps. The\n  # default value below will minimize memory
    usage in the default installation;\n  # users who are sensitive to latency may
    consider setting this to \"true\".\n  #\n  # This option was introduced in Cilium
    1.4. Cilium 1.3 and earlier ignore\n  # this option and behave as though it is
    set to \"true\".\n  #\n  # If this value is modified, then during the next Cilium
    startup the restore\n  # of existing endpoints and tracking of ongoing connections
    may be disrupted.\n  # As a result, reply packets may be dropped and the load-balancing
    decisions\n  # for established connections may change.\n  #\n  # If this option
    is set to \"false\" during an upgrade from 1.3 or earlier to\n  # 1.4 or later,
    then it may cause one-time disruptions during the upgrade.\n  preallocate-bpf-maps:
    \"false\"\n\n  # Name of the cluster. Only relevant when building a mesh of clusters.\n
    \ cluster-name: \"default\"\n  # Unique ID of the cluster. Must be unique across
    all connected clusters and\n  # in the range of 1 and 255. Only relevant when
    building a mesh of clusters.\n  cluster-id: \"0\"\n\n  # Encapsulation mode for
    communication between nodes\n  # Possible values:\n  #   - disabled\n  #   - vxlan
    (default)\n  #   - geneve\n\n  routing-mode: \"tunnel\"\n  tunnel-protocol: \"vxlan\"\n
    \ tunnel-source-port-range: \"0-0\"\n  service-no-backend-response: \"reject\"\n
    \ policy-deny-response: \"none\"\n\n\n  # Enables L7 proxy for L7 policy enforcement
    and visibility\n  enable-l7-proxy: \"true\"\n  enable-ipv4-masquerade: \"true\"\n
    \ enable-ipv4-big-tcp: \"false\"\n  enable-ipv6-big-tcp: \"false\"\n  enable-ipv6-masquerade:
    \"true\"\n  enable-tcx: \"true\"\n  datapath-mode: \"veth\"\n  enable-masquerade-to-route-source:
    \"false\"\n\n  enable-xt-socket-fallback: \"true\"\n  install-no-conntrack-iptables-rules:
    \"false\"\n  iptables-random-fully: \"false\"\n\n  auto-direct-node-routes: \"false\"\n
    \ direct-routing-skip-unreachable: \"false\"\n\n\n\n  kube-proxy-replacement:
    \"false\"\n  enable-no-service-endpoints-routable: \"true\"\n  bpf-lb-sock: \"false\"\n
    \ enable-health-check-nodeport: \"true\"\n  enable-health-check-loadbalancer-ip:
    \"false\"\n  node-port-bind-protection: \"true\"\n  enable-auto-protect-node-port-range:
    \"true\"\n  bpf-lb-acceleration: \"disabled\"\n  enable-service-topology: \"false\"\n
    \ enable-l2-neigh-discovery: \"false\"\n  k8s-require-ipv4-pod-cidr: \"false\"\n
    \ k8s-require-ipv6-pod-cidr: \"false\"\n  enable-k8s-networkpolicy: \"true\"\n
    \ enable-endpoint-lockdown-on-policy-overflow: \"false\"\n  # Tell the agent to
    generate and write a CNI configuration file\n  write-cni-conf-when-ready: /host/etc/cni/net.d/05-cilium.conflist\n
    \ cni-exclusive: \"true\"\n  cni-log-file: \"/var/run/cilium/cilium-cni.log\"\n
    \ enable-endpoint-health-checking: \"true\"\n  enable-health-checking: \"true\"\n
    \ health-check-icmp-failure-threshold: \"3\"\n  enable-well-known-identities:
    \"false\"\n  enable-node-selector-labels: \"false\"\n  synchronize-k8s-nodes:
    \"true\"\n  operator-api-serve-addr: \"127.0.0.1:9234\"\n\n  enable-hubble: \"true\"\n
    \ # UNIX domain socket for Hubble server to listen to.\n  hubble-socket-path:
    \"/var/run/cilium/hubble.sock\"\n  hubble-network-policy-correlation-enabled:
    \"true\"\n  # An additional address for Hubble server to listen to (e.g. \":4244\").\n
    \ hubble-listen-address: \":4244\"\n  hubble-disable-tls: \"false\"\n  hubble-tls-cert-file:
    /var/lib/cilium/tls/hubble/server.crt\n  hubble-tls-key-file: /var/lib/cilium/tls/hubble/server.key\n
    \ hubble-tls-client-ca-files: /var/lib/cilium/tls/hubble/client-ca.crt\n  ipam:
    \"kubernetes\"\n  ipam-cilium-node-update-rate: \"15s\"\n\n  default-lb-service-ipam:
    \"lbipam\"\n  egress-gateway-reconciliation-trigger-interval: \"1s\"\n  enable-vtep:
    \"false\"\n  vtep-endpoint: \"\"\n  vtep-cidr: \"\"\n  vtep-mask: \"\"\n  vtep-mac:
    \"\"\n\n  packetization-layer-pmtud-mode: \"blackhole\"\n  procfs: \"/host/proc\"\n
    \ bpf-root: \"/sys/fs/bpf\"\n  cgroup-root: \"/run/cilium/cgroupv2\"\n\n  identity-management-mode:
    \"agent\"\n  enable-sctp: \"false\"\n  remove-cilium-node-taints: \"true\"\n  set-cilium-node-taints:
    \"true\"\n  set-cilium-is-up-condition: \"true\"\n  unmanaged-pod-watcher-interval:
    \"15s\"\n  # default DNS proxy to transparent mode in non-chaining modes\n  dnsproxy-enable-transparent-mode:
    \"true\"\n  dnsproxy-socket-linger-timeout: \"10\"\n  tofqdns-dns-reject-response-code:
    \"refused\"\n  tofqdns-enable-dns-compression: \"true\"\n  tofqdns-endpoint-max-ip-per-hostname:
    \"1000\"\n  tofqdns-idle-connection-grace-period: \"0s\"\n  tofqdns-max-deferred-connection-deletes:
    \"10000\"\n  tofqdns-proxy-response-max-delay: \"100ms\"\n  tofqdns-preallocate-identities:
    \ \"true\"\n  agent-not-ready-taint-key: \"node.cilium.io/agent-not-ready\"\n\n
    \ mesh-auth-enabled: \"false\"\n  mesh-auth-queue-size: \"1024\"\n  mesh-auth-rotated-identities-queue-size:
    \"1024\"\n  mesh-auth-gc-interval: \"5m0s\"\n\n  proxy-xff-num-trusted-hops-ingress:
    \"0\"\n  proxy-xff-num-trusted-hops-egress: \"0\"\n  proxy-connect-timeout: \"2\"\n
    \ proxy-initial-fetch-timeout: \"30\"\n  proxy-max-active-downstream-connections:
    \"50000\"\n  proxy-max-requests-per-connection: \"0\"\n  proxy-max-connection-duration-seconds:
    \"0\"\n  proxy-idle-timeout-seconds: \"60\"\n  proxy-max-concurrent-retries: \"128\"\n
    \ proxy-use-original-source-address: \"true\"\n  proxy-cluster-max-connections:
    \"1024\"\n  proxy-cluster-max-requests: \"1024\"\n  http-retry-count: \"3\"\n
    \ http-stream-idle-timeout: \"300\"\n\n  external-envoy-proxy: \"true\"\n  envoy-base-id:
    \"0\"\n  envoy-access-log-buffer-size: \"4096\"\n  envoy-keep-cap-netbindservice:
    \"false\"\n  max-connected-clusters: \"255\"\n  clustermesh-cache-ttl: \"0s\"\n
    \ clustermesh-enable-endpoint-sync: \"false\"\n  clustermesh-enable-mcs-api: \"false\"\n
    \ clustermesh-mcs-api-install-crds: \"true\"\n  policy-default-local-cluster:
    \"true\"\n\n  nat-map-stats-entries: \"32\"\n  nat-map-stats-interval: \"30s\"\n
    \ enable-lb-ipam: \"true\"\n  enable-non-default-deny-policies: \"true\"\n  enable-source-ip-verification:
    \"true\"\n  enable-dynamic-config: \"true\"\n  enable-drift-checker: \"true\"\n\n#
    Extra config allows adding arbitrary properties to the cilium config.\n# By putting
    it at the end of the ConfigMap, it's also possible to override existing properties.\n---\n#
    Source: cilium/templates/cilium-envoy/configmap.yaml\napiVersion: v1\nkind: ConfigMap\nmetadata:\n
    \ name: cilium-envoy-config\n  namespace: kube-system\ndata:\n  # Keep the key
    name as bootstrap-config.json to avoid breaking changes\n  bootstrap-config.json:
    |\n    {\"admin\":{\"address\":{\"pipe\":{\"mode\":432,\"path\":\"/var/run/cilium/envoy/sockets/admin.sock\"}}},\"applicationLogConfig\":{\"logFormat\":{\"textFormat\":\"[%Y-%m-%d
    %T.%e][%t][%l][%n] [%g:%#] %v\"}},\"bootstrapExtensions\":[{\"name\":\"envoy.bootstrap.internal_listener\",\"typedConfig\":{\"@type\":\"type.googleapis.com/envoy.extensions.bootstrap.internal_listener.v3.InternalListener\"}}],\"dynamicResources\":{\"cdsConfig\":{\"apiConfigSource\":{\"apiType\":\"GRPC\",\"grpcServices\":[{\"envoyGrpc\":{\"clusterName\":\"xds-grpc-cilium\"}}],\"setNodeOnFirstMessageOnly\":true,\"transportApiVersion\":\"V3\"},\"initialFetchTimeout\":\"30s\",\"resourceApiVersion\":\"V3\"},\"ldsConfig\":{\"apiConfigSource\":{\"apiType\":\"GRPC\",\"grpcServices\":[{\"envoyGrpc\":{\"clusterName\":\"xds-grpc-cilium\"}}],\"setNodeOnFirstMessageOnly\":true,\"transportApiVersion\":\"V3\"},\"initialFetchTimeout\":\"30s\",\"resourceApiVersion\":\"V3\"}},\"node\":{\"cluster\":\"ingress-cluster\",\"id\":\"host~127.0.0.1~no-id~localdomain\"},\"overloadManager\":{\"resourceMonitors\":[{\"name\":\"envoy.resource_monitors.global_downstream_max_connections\",\"typedConfig\":{\"@type\":\"type.googleapis.com/envoy.extensions.resource_monitors.downstream_connections.v3.DownstreamConnectionsConfig\",\"max_active_downstream_connections\":\"50000\"}}]},\"staticResources\":{\"clusters\":[{\"circuitBreakers\":{\"thresholds\":[{\"maxConnections\":1024,\"maxRequests\":1024,\"maxRetries\":128}]},\"cleanupInterval\":\"2.500s\",\"connectTimeout\":\"2s\",\"lbPolicy\":\"CLUSTER_PROVIDED\",\"name\":\"ingress-cluster\",\"type\":\"ORIGINAL_DST\",\"typedExtensionProtocolOptions\":{\"envoy.extensions.upstreams.http.v3.HttpProtocolOptions\":{\"@type\":\"type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions\",\"commonHttpProtocolOptions\":{\"idleTimeout\":\"60s\",\"maxConnectionDuration\":\"0s\",\"maxRequestsPerConnection\":0},\"useDownstreamProtocolConfig\":{}}}},{\"circuitBreakers\":{\"thresholds\":[{\"maxConnections\":1024,\"maxRequests\":1024,\"maxRetries\":128}]},\"cleanupInterval\":\"2.500s\",\"connectTimeout\":\"2s\",\"lbPolicy\":\"CLUSTER_PROVIDED\",\"name\":\"egress-cluster-tls\",\"transportSocket\":{\"name\":\"cilium.tls_wrapper\",\"typedConfig\":{\"@type\":\"type.googleapis.com/cilium.UpstreamTlsWrapperContext\"}},\"type\":\"ORIGINAL_DST\",\"typedExtensionProtocolOptions\":{\"envoy.extensions.upstreams.http.v3.HttpProtocolOptions\":{\"@type\":\"type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions\",\"commonHttpProtocolOptions\":{\"idleTimeout\":\"60s\",\"maxConnectionDuration\":\"0s\",\"maxRequestsPerConnection\":0},\"upstreamHttpProtocolOptions\":{},\"useDownstreamProtocolConfig\":{}}}},{\"circuitBreakers\":{\"thresholds\":[{\"maxConnections\":1024,\"maxRequests\":1024,\"maxRetries\":128}]},\"cleanupInterval\":\"2.500s\",\"connectTimeout\":\"2s\",\"lbPolicy\":\"CLUSTER_PROVIDED\",\"name\":\"egress-cluster\",\"type\":\"ORIGINAL_DST\",\"typedExtensionProtocolOptions\":{\"envoy.extensions.upstreams.http.v3.HttpProtocolOptions\":{\"@type\":\"type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions\",\"commonHttpProtocolOptions\":{\"idleTimeout\":\"60s\",\"maxConnectionDuration\":\"0s\",\"maxRequestsPerConnection\":0},\"useDownstreamProtocolConfig\":{}}}},{\"circuitBreakers\":{\"thresholds\":[{\"maxConnections\":1024,\"maxRequests\":1024,\"maxRetries\":128}]},\"cleanupInterval\":\"2.500s\",\"connectTimeout\":\"2s\",\"lbPolicy\":\"CLUSTER_PROVIDED\",\"name\":\"ingress-cluster-tls\",\"transportSocket\":{\"name\":\"cilium.tls_wrapper\",\"typedConfig\":{\"@type\":\"type.googleapis.com/cilium.UpstreamTlsWrapperContext\"}},\"type\":\"ORIGINAL_DST\",\"typedExtensionProtocolOptions\":{\"envoy.extensions.upstreams.http.v3.HttpProtocolOptions\":{\"@type\":\"type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions\",\"commonHttpProtocolOptions\":{\"idleTimeout\":\"60s\",\"maxConnectionDuration\":\"0s\",\"maxRequestsPerConnection\":0},\"upstreamHttpProtocolOptions\":{},\"useDownstreamProtocolConfig\":{}}}},{\"connectTimeout\":\"2s\",\"loadAssignment\":{\"clusterName\":\"xds-grpc-cilium\",\"endpoints\":[{\"lbEndpoints\":[{\"endpoint\":{\"address\":{\"pipe\":{\"path\":\"/var/run/cilium/envoy/sockets/xds.sock\"}}}}]}]},\"name\":\"xds-grpc-cilium\",\"type\":\"STATIC\",\"typedExtensionProtocolOptions\":{\"envoy.extensions.upstreams.http.v3.HttpProtocolOptions\":{\"@type\":\"type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions\",\"explicitHttpConfig\":{\"http2ProtocolOptions\":{}}}}},{\"connectTimeout\":\"2s\",\"loadAssignment\":{\"clusterName\":\"/envoy-admin\",\"endpoints\":[{\"lbEndpoints\":[{\"endpoint\":{\"address\":{\"pipe\":{\"path\":\"/var/run/cilium/envoy/sockets/admin.sock\"}}}}]}]},\"name\":\"/envoy-admin\",\"type\":\"STATIC\"}],\"listeners\":[{\"address\":{\"socketAddress\":{\"address\":\"0.0.0.0\",\"portValue\":9964}},\"filterChains\":[{\"filters\":[{\"name\":\"envoy.filters.network.http_connection_manager\",\"typedConfig\":{\"@type\":\"type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager\",\"httpFilters\":[{\"name\":\"envoy.filters.http.router\",\"typedConfig\":{\"@type\":\"type.googleapis.com/envoy.extensions.filters.http.router.v3.Router\"}}],\"internalAddressConfig\":{\"cidrRanges\":[{\"addressPrefix\":\"10.0.0.0\",\"prefixLen\":8},{\"addressPrefix\":\"172.16.0.0\",\"prefixLen\":12},{\"addressPrefix\":\"192.168.0.0\",\"prefixLen\":16},{\"addressPrefix\":\"127.0.0.1\",\"prefixLen\":32}]},\"routeConfig\":{\"virtualHosts\":[{\"domains\":[\"*\"],\"name\":\"prometheus_metrics_route\",\"routes\":[{\"match\":{\"prefix\":\"/metrics\"},\"name\":\"prometheus_metrics_route\",\"route\":{\"cluster\":\"/envoy-admin\",\"prefixRewrite\":\"/stats/prometheus\"}}]}]},\"statPrefix\":\"envoy-prometheus-metrics-listener\",\"streamIdleTimeout\":\"300s\"}}]}],\"name\":\"envoy-prometheus-metrics-listener\"},{\"address\":{\"socketAddress\":{\"address\":\"127.0.0.1\",\"portValue\":9878}},\"filterChains\":[{\"filters\":[{\"name\":\"envoy.filters.network.http_connection_manager\",\"typedConfig\":{\"@type\":\"type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager\",\"httpFilters\":[{\"name\":\"envoy.filters.http.router\",\"typedConfig\":{\"@type\":\"type.googleapis.com/envoy.extensions.filters.http.router.v3.Router\"}}],\"internalAddressConfig\":{\"cidrRanges\":[{\"addressPrefix\":\"10.0.0.0\",\"prefixLen\":8},{\"addressPrefix\":\"172.16.0.0\",\"prefixLen\":12},{\"addressPrefix\":\"192.168.0.0\",\"prefixLen\":16},{\"addressPrefix\":\"127.0.0.1\",\"prefixLen\":32}]},\"routeConfig\":{\"virtual_hosts\":[{\"domains\":[\"*\"],\"name\":\"health\",\"routes\":[{\"match\":{\"prefix\":\"/healthz\"},\"name\":\"health\",\"route\":{\"cluster\":\"/envoy-admin\",\"prefixRewrite\":\"/ready\"}}]}]},\"statPrefix\":\"envoy-health-listener\",\"streamIdleTimeout\":\"300s\"}}]}],\"name\":\"envoy-health-listener\"}]}}\n\n---\n#
    Source: cilium/templates/cilium-agent/clusterrole.yaml\napiVersion: rbac.authorization.k8s.io/v1\nkind:
    ClusterRole\nmetadata:\n  name: cilium\n  labels:\n    app.kubernetes.io/part-of:
    cilium\nrules:\n- apiGroups:\n  - networking.k8s.io\n  resources:\n  - networkpolicies\n
    \ verbs:\n  - get\n  - list\n  - watch\n- apiGroups:\n  - discovery.k8s.io\n  resources:\n
    \ - endpointslices\n  verbs:\n  - get\n  - list\n  - watch\n- apiGroups:\n  -
    \"\"\n  resources:\n  - namespaces\n  - services\n  - pods\n  - endpoints\n  -
    nodes\n  verbs:\n  - get\n  - list\n  - watch\n- apiGroups:\n  - apiextensions.k8s.io\n
    \ resources:\n  - customresourcedefinitions\n  verbs:\n  - list\n  - watch\n  #
    This is used when validating policies in preflight. This will need to stay\n  #
    until we figure out how to avoid \"get\" inside the preflight, and then\n  # should
    be removed ideally.\n  - get\n- apiGroups:\n  - cilium.io\n  resources:\n  - ciliumloadbalancerippools\n
    \ - ciliumbgppeeringpolicies\n  - ciliumbgpnodeconfigs\n  - ciliumbgpadvertisements\n
    \ - ciliumbgppeerconfigs\n  - ciliumclusterwideenvoyconfigs\n  - ciliumclusterwidenetworkpolicies\n
    \ - ciliumegressgatewaypolicies\n  - ciliumendpoints\n  - ciliumendpointslices\n
    \ - ciliumenvoyconfigs\n  - ciliumidentities\n  - ciliumlocalredirectpolicies\n
    \ - ciliumnetworkpolicies\n  - ciliumnodes\n  - ciliumnodeconfigs\n  - ciliumcidrgroups\n
    \ - ciliuml2announcementpolicies\n  - ciliumpodippools\n  verbs:\n  - list\n  -
    watch\n- apiGroups:\n  - cilium.io\n  resources:\n  - ciliumidentities\n  - ciliumendpoints\n
    \ - ciliumnodes\n  verbs:\n  - create\n- apiGroups:\n  - cilium.io\n  # To synchronize
    garbage collection of such resources\n  resources:\n  - ciliumidentities\n  verbs:\n
    \ - update\n- apiGroups:\n  - cilium.io\n  resources:\n  - ciliumendpoints\n  verbs:\n
    \ - delete\n  - get\n- apiGroups:\n  - cilium.io\n  resources:\n  - ciliumnodes\n
    \ - ciliumnodes/status\n  verbs:\n  - get\n  - update\n- apiGroups:\n  - cilium.io\n
    \ resources:\n  - ciliumendpoints/status\n  - ciliumendpoints\n  - ciliuml2announcementpolicies/status\n
    \ - ciliumbgpnodeconfigs/status\n  verbs:\n  - patch\n\n---\n# Source: cilium/templates/cilium-operator/clusterrole.yaml\napiVersion:
    rbac.authorization.k8s.io/v1\nkind: ClusterRole\nmetadata:\n  name: cilium-operator\n
    \ labels:\n    app.kubernetes.io/part-of: cilium\nrules:\n- apiGroups:\n  - \"\"\n
    \ resources:\n  - pods\n  verbs:\n  - get\n  - list\n  - watch\n  # to automatically
