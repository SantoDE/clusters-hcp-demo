---
apiVersion: v1
kind: Namespace
metadata:
  name: capi-kamaji-kubevirt
  labels:
    cluster-api.cattle.io/rancher-auto-import: "true"
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: kamaji-kubevirt
  namespace: capi-kamaji-kubevirt
  labels:
    cluster.x-k8s.io/cluster-name: kamaji-kubevirt
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
        - 10.244.0.0/16
    services:
      cidrBlocks:
        - 10.96.0.0/12
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1alpha2
    kind: KamajiControlPlane
    name: kamaji-kubevirt-cp
    namespace: capi-kamaji-kubevirt
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
    kind: KubevirtCluster
    name: kamaji-kubevirt
    namespace: capi-kamaji-kubevirt
---
# Pre-set controlPlaneEndpoint using the Kamaji service FQDN so CAPK uses it instead of
# creating a kamaji-kubevirt-lb service whose IP won't be in the cert SANs.
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubevirtCluster
metadata:
  name: kamaji-kubevirt
  namespace: capi-kamaji-kubevirt
spec:
  controlPlaneEndpoint:
    host: kamaji-kubevirt-cp.capi-kamaji-kubevirt.svc.cluster.local
    port: 6443
---
apiVersion: controlplane.cluster.x-k8s.io/v1alpha2
kind: KamajiControlPlane
metadata:
  name: kamaji-kubevirt-cp
  namespace: capi-kamaji-kubevirt
spec:
  replicas: 1
  version: "1.35.0"
  dataStoreName: default
  addons:
    coreDNS: {}
    kubeProxy: {}
  kubelet:
    cgroupfs: systemd
    preferredAddressTypes:
      - ExternalIP
      - InternalIP
      - Hostname
  network:
    serviceType: ClusterIP
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: kamaji-kubevirt-md-0
  namespace: capi-kamaji-kubevirt
spec:
  clusterName: kamaji-kubevirt
  replicas: 1
  selector:
    matchLabels: null
  template:
    spec:
      clusterName: kamaji-kubevirt
      version: v1.35.0
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
          kind: KubeadmConfigTemplate
          name: kamaji-kubevirt-md-0
          namespace: capi-kamaji-kubevirt
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
        kind: KubevirtMachineTemplate
        name: kamaji-kubevirt-md-0-v2
        namespace: capi-kamaji-kubevirt
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: KubeadmConfigTemplate
metadata:
  name: kamaji-kubevirt-md-0
  namespace: capi-kamaji-kubevirt
spec:
  template:
    spec:
      files:
        - path: /etc/modules-load.d/k8s.conf
          content: |
            overlay
            br_netfilter
        - path: /etc/sysctl.d/k8s.conf
          content: |
            net.bridge.bridge-nf-call-iptables=1
            net.bridge.bridge-nf-call-ip6tables=1
            net.ipv4.ip_forward=1
        - path: /etc/crictl.yaml
          content: |
            runtime-endpoint: unix:///run/containerd/containerd.sock
            image-endpoint: unix:///run/containerd/containerd.sock
            timeout: 10
            debug: false
        - path: /etc/containerd/config.toml
          content: |
            version = 3
            [plugins."io.containerd.grpc.v1.cri"]
              [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc]
                runtime_type = "io.containerd.runc.v2"
                [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc.options]
                  SystemdCgroup = true
            [plugins."io.containerd.snapshotter.v1.overlayfs"]
              slow_chown = true
      preKubeadmCommands:
        - "resolvectl dns enp1s0 10.43.0.10 8.8.8.8 8.8.4.4 || true"
        - "resolvectl domain enp1s0 svc.cluster.local cluster.local || true"
        - "until nslookup k8s.io >/dev/null 2>&1; do sleep 1; done"
        - "modprobe overlay && modprobe br_netfilter"
        - "sysctl --system"
        - "apt-get update -y"
        - "apt-get install -y apt-transport-https ca-certificates curl gpg"
        - "install -m 0755 -d /etc/apt/keyrings"
        - "curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.35/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg"
        - "echo 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.35/deb/ /' > /etc/apt/sources.list.d/kubernetes.list"
        - "apt-get install -y containerd"
        - "systemctl restart containerd"
        - "apt-get update -y && apt-get install -y kubelet kubeadm"
        - "apt-mark hold kubelet kubeadm"
      joinConfiguration:
        nodeRegistration:
          kubeletExtraArgs:
            cloud-provider: ""
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubevirtMachineTemplate
metadata:
  name: kamaji-kubevirt-md-0-v2
  namespace: capi-kamaji-kubevirt
spec:
  template:
    spec:
      virtualMachineBootstrapCheck:
        checkStrategy: none
      virtualMachineTemplate:
        spec:
          runStrategy: Always
          dataVolumeTemplates:
            - metadata:
                name: boot
              spec:
                pvc:
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 20Gi
                source:
                  registry:
                    url: docker://quay.io/containerdisks/ubuntu:24.04
          template:
            spec:
              domain:
                cpu:
                  cores: 2
                memory:
                  guest: 4Gi
                devices:
                  disks:
                    - name: boot
                      disk:
                        bus: virtio
                  interfaces:
                    - name: default
                      masquerade: {}
                      ports:
                        - name: ssh
                          port: 22
                          protocol: TCP
                        - name: kubelet
                          port: 10250
                          protocol: TCP
              volumes:
                - name: boot
                  dataVolume:
                    name: boot
              networks:
                - name: default
                  pod: {}
